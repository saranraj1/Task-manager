<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <!-- Explicit CSP to allow Vercel Toolbar fonts, Google Fonts, and internal scripts to function perfectly -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.vercel.app; font-src 'self' data: https://fonts.gstatic.com https://*.vercel.app; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' wss://*.vercel.app https://*.vercel.app; img-src 'self' data: https://*.vercel.app;">
  
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

:root {
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --bg-app: #f4f5f7;
  --bg-panel: #ffffff;
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-tertiary: #94a3b8;
  --border-subtle: #e2e8f0;
  --border-focus: #cbd5e1;
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --primary-bg: #eef2ff;
  --danger: #ef4444;
  --danger-hover: #dc2626;
  --success: #10b981;
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --shadow-btn: 0 1px 2px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.15);
  --radius-md: 8px;
  --radius-lg: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background-color: var(--bg-app);
  color: var(--text-primary);
  line-height: 1.5;
  padding: 3rem 1rem;
  display: flex;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}

.sr-only { position: absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }

.app {
  width: 100%;
  max-width: 640px;
}

.header { margin-bottom: 24px; text-align: left; }
.header h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; color: var(--text-primary); letter-spacing: -0.025em; }
.header p { font-size: 14px; color: var(--text-secondary); }

.stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  margin-bottom: 24px;
}
.stat {
  background: var(--bg-panel);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 16px;
  text-align: left;
  box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column;
}
.stat-val { font-size: 28px; font-weight: 600; color: var(--text-primary); line-height: 1; margin-bottom: 4px; }
.stat-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }

.add-form {
  background: var(--bg-panel);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow-md);
}
.add-form h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text-primary); }
.form-row { display: flex; gap: 12px; }
.form-row input {
  flex: 1; height: 40px; padding: 0 14px;
  border: 1px solid var(--border-focus); border-radius: var(--radius-md);
  font-size: 14px; font-family: inherit; color: var(--text-primary);
  outline: none; transition: all 0.2s ease;
  background-color: #fafafa;
}
.form-row input:focus { border-color: var(--primary); background-color: #ffffff; box-shadow: 0 0 0 3px var(--primary-bg); }
.form-row input::placeholder { color: var(--text-tertiary); }

.btn {
  height: 40px; padding: 0 20px;
  border: none; border-radius: var(--radius-md);
  font-size: 14px; font-weight: 500; cursor: pointer;
  transition: all 0.2s ease;
  font-family: inherit; display: inline-flex; align-items: center; justify-content: center;
}
.btn-primary { 
  background-color: var(--primary); color: white; 
  box-shadow: var(--shadow-btn);
}
.btn-primary:hover { background-color: var(--primary-hover); }
.btn-primary:active { transform: translateY(1px); }
.btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

.filters { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 16px; }
.filter-btn {
  height: 32px; padding: 0 16px;
  border: 1px solid transparent; border-radius: 20px;
  font-size: 14px; font-weight: 500; cursor: pointer;
  background: transparent; color: var(--text-secondary);
  font-family: inherit; transition: all 0.2s;
}
.filter-btn:hover { background: #f1f5f9; color: var(--text-primary); }
.filter-btn.active {
  background: var(--text-primary);
  color: white;
}

.task-list { display: flex; flex-direction: column; gap: 12px; }
.task-item {
  background: var(--bg-panel);
  border: 1px solid var(--border-subtle); border-radius: var(--radius-md);
  padding: 16px; display: flex; align-items: flex-start; gap: 16px;
  box-shadow: var(--shadow-sm); transition: transform 0.2s, box-shadow 0.2s;
}
.task-item:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.task-item.done { background-color: #fafafa; border-color: #f1f5f9; box-shadow: none; }
.task-item.done .task-title { text-decoration: line-through; color: var(--text-tertiary); }

.checkbox {
  width: 20px; height: 20px; margin-top: 2px;
  border: 1.5px solid var(--border-focus); border-radius: 6px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; background: white; transition: all 0.2s;
}
.checkbox:hover { border-color: var(--primary); }
.checkbox.checked { background: var(--success); border-color: var(--success); }
.check-icon { display: none; width: 12px; height: 12px; }
.checkbox.checked .check-icon { display: block; fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

.task-content { flex: 1; min-width: 0; }
.task-title { font-size: 15px; color: var(--text-primary); font-weight: 500; line-height: 1.4; word-break: break-word; }
.task-meta { font-size: 13px; color: var(--text-tertiary); margin-top: 6px; display: flex; align-items: center; gap: 8px; }

.badge {
  padding: 2px 8px; border-radius: 12px;
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
}
.badge-pending { background: #fffbeb; color: #b45309; border: 1px solid #fef3c7; }
.badge-done { background: #ecfdf5; color: #047857; border: 1px solid #d1fae5; }

.task-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.2s; }
.task-item:hover .task-actions { opacity: 1; }
@media (max-width: 640px) { .task-actions { opacity: 1; } }

.icon-btn {
  width: 32px; height: 32px;
  border: 1px solid transparent; border-radius: var(--radius-md);
  background: transparent; color: var(--text-secondary);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.2s;
}
.icon-btn:hover { background: #f1f5f9; color: var(--text-primary); border-color: var(--border-subtle); }
.icon-btn.danger:hover { background: #fef2f2; color: var(--danger); border-color: #fee2e2; }

.task-edit-input {
  width: 100%; height: 32px; padding: 0 10px;
  border: 1px solid var(--primary); border-radius: var(--radius-md);
  font-size: 14px; outline: none; font-family: inherit;
  background: #ffffff; color: var(--text-primary);
  box-shadow: 0 0 0 2px var(--primary-bg);
}

.empty { text-align: center; padding: 48px 24px; color: var(--text-tertiary); font-size: 14px; background: transparent; border: 1px dashed var(--border-focus); border-radius: var(--radius-lg); }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px);
  background: var(--text-primary); color: white;
  padding: 12px 20px; border-radius: 30px;
  font-size: 14px; font-weight: 500;
  opacity: 0; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none; z-index: 50;
  box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.error-msg { font-size: 13px; color: var(--danger); margin-top: 8px; min-height: 18px; }
</style>


<h2 class="sr-only">Task Manager reference application — create, view, update, and delete tasks</h2>

<div class="app">
  <div class="header">
    <h1>Task Manager</h1>
    <p>Reference implementation — frontend + mock REST API</p>
  </div>

  <div class="add-form">
    <h2>Add a new task</h2>
    <div class="form-row">
      <input type="text" id="taskInput" placeholder="Enter task title..." maxlength="120" />
      <button class="btn btn-primary" onclick="addTask()">POST /tasks</button>
    </div>
    <div class="error-msg" id="addError"></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="statTotal">0</div><div class="stat-label">Total tasks</div></div>
    <div class="stat"><div class="stat-val" id="statPending">0</div><div class="stat-label">Pending</div></div>
    <div class="stat"><div class="stat-val" id="statDone">0</div><div class="stat-label">Completed</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('completed',this)">Completed</button>
  </div>

  <div id="taskList" class="task-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let tasks = [];
let filter = 'all';
let editingId = null;

function fmtDate(iso){
  if (!iso) return '';
  const d=new Date(iso);
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.classList.remove('show'),2200);
}

function updateStats(){
  const total=tasks.length,done=tasks.filter(t=>t.completed).length;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statDone').textContent=done;
  document.getElementById('statPending').textContent=total-done;
}

function getFiltered(){
  if(filter==='completed') return tasks.filter(t=>t.completed);
  if(filter==='pending') return tasks.filter(t=>!t.completed);
  return tasks;
}

function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render(){
  updateStats();
  const list=document.getElementById('taskList');
  const filtered=getFiltered();
  if(filtered.length===0){
    list.innerHTML='<div class="empty">No tasks here yet.</div>';
    return;
  }
  list.innerHTML=filtered.map(task=>{
    const isEditing=editingId===task.id;
    return `<div class="task-item${task.completed?' done':''}" id="item-${task.id}">
      <div class="checkbox${task.completed?' checked':''}" onclick="toggleTask('${task.id}')" title="PATCH /api/tasks?id=${task.id}">
        <svg class="check-icon" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 5l2.5 2.5L8 3" stroke="var(--success-color)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="task-content">
        ${isEditing
          ? `<input class="task-edit-input" id="edit-${task.id}" value="${task.title.replace(/"/g,'&quot;')}" onkeydown="handleEditKey(event,'${task.id}')" />`
          : `<div class="task-title">${escHtml(task.title)}</div>
             <div class="task-meta">${fmtDate(task.createdat || task.createdAt)} &nbsp;·&nbsp; <span class="badge ${task.completed?'badge-done':'badge-pending'}">${task.completed?'completed':'pending'}</span></div>`
        }
      </div>
      <div class="task-actions">
        ${isEditing
          ? `<button class="icon-btn" onclick="saveEdit('${task.id}')" title="Save">✓</button>
             <button class="icon-btn" onclick="cancelEdit()" title="Cancel">✕</button>`
          : `<button class="icon-btn" onclick="startEdit('${task.id}')" title="Edit title (bonus)">✎</button>
             <button class="icon-btn danger" onclick="deleteTask('${task.id}')" title="DELETE /api/tasks?id=${task.id}">✕</button>`
        }
      </div>
    </div>`;
  }).join('');
  if(editingId){
    const inp=document.getElementById('edit-'+editingId);
    if(inp){inp.focus();inp.select();}
  }
}

function escHtml(s){
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function fetchTasks() {
  try {
    const res = await fetch('/api/tasks');
    if (!res.ok) throw new Error('Ready logic missing');
    const data = await res.json();
    tasks = data;
    render();
  } catch (error) {
    showToast('App ready. Connect DB URL to run Vercel fetch.');
  }
}

async function addTask(){
  const inp=document.getElementById('taskInput');
  const err=document.getElementById('addError');
  const title=inp.value.trim();
  if(!title){err.textContent='Title is required.';return;}
  if(title.length<3){err.textContent='Title must be at least 3 characters.';return;}
  err.textContent='';
  const btn=document.querySelector('.btn-primary');
  btn.textContent='Adding...';btn.disabled=true;
  
  try {
    const res = await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, completed: false, createdAt: new Date().toISOString() })
    });
    if (!res.ok) throw new Error('Failed to add');
    const newTask = await res.json();
    tasks.unshift(newTask);
    inp.value='';
    showToast('Task added');
    render();
  } catch (error) {
    showToast('Failed. Make sure backend and DB are active.');
  } finally {
    btn.textContent='Add Task';btn.disabled=false;
  }
}

async function toggleTask(id){
  const task=tasks.find(t=>t.id===id);
  if(!task) return;
  const newStatus = !task.completed;
  
  // Optimistic update
  task.completed = newStatus;
  render();
  
  try {
    await fetch(`/api/tasks?id=${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ completed: newStatus })
    });
    showToast('Task updated');
  } catch (error) {
    task.completed = !newStatus; // revert
    render();
    showToast('Error updating task');
  }
}

function startEdit(id){
  editingId=id;
  render();
}

function cancelEdit(){editingId=null;render();}

function handleEditKey(e,id){
  if(e.key==='Enter') saveEdit(id);
  if(e.key==='Escape') cancelEdit();
}

async function saveEdit(id){
  const inp=document.getElementById('edit-'+id);
  if(!inp) return;
  const val=inp.value.trim();
  if(!val||val.length<3){inp.style.borderColor='var(--danger-color)';return;}
  
  const task=tasks.find(t=>t.id===id);
  if(!task) return;
  const oldTitle = task.title;
  
  task.title=val;
  editingId=null;
  render();
  
  try {
    await fetch(`/api/tasks?id=${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: val })
    });
    showToast('Task title updated');
  } catch (error) {
    task.title = oldTitle; // revert
    render();
    showToast('Error saving task');
  }
}

async function deleteTask(id){
  const el=document.getElementById('item-'+id);
  if(el){el.style.opacity='0.3';el.style.transition='opacity 0.2s';}
  
  const oldTasks = [...tasks];
  tasks = tasks.filter(t=>t.id!==id);
  render();
  
  try {
    await fetch(`/api/tasks?id=${id}`, { method: 'DELETE' });
    showToast('Task deleted');
  } catch (error) {
    tasks = oldTasks; // revert
    render();
    showToast('Error deleting task');
  }
}

document.getElementById('taskInput').addEventListener('keydown',e=>{
  if(e.key==='Enter') addTask();
});

fetchTasks();
</script>
